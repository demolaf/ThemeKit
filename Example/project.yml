name: Example
options:
  bundleIdPrefix: com.themekit
  deploymentTarget:
    iOS: "17.0"

packages:
  ThemeKit:
    path: ..

targets:
  Example:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
      - Home
      - Colors
      - Christmas
    dependencies:
      - package: ThemeKit
        product: ThemeKit
      - package: ThemeKit
        product: ThemeKitSwiftUI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.themekit.example
        SWIFT_VERSION: 5.0
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

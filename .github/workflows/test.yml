name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Run package tests (iOS)
        run: |
          xcodebuild test \
            -workspace .swiftpm/xcode/package.xcworkspace \
            -scheme ThemeKit-Package \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17'

      - name: Run package tests (macOS)
        run: swift test --arch arm64

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate example project
        working-directory: Example
        run: xcodegen generate

      - name: Build ExampleSwiftUI
        run: |
          xcodebuild build \
            -project Example/Example.xcodeproj \
            -scheme ExampleSwiftUI \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build ExampleUIKit
        run: |
          xcodebuild build \
            -project Example/Example.xcodeproj \
            -scheme ExampleUIKit \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO

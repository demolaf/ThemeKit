name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-15
            simulator: 'platform=iOS Simulator,OS=latest,name=iPhone 16'
          - os: macos-26
            simulator: 'platform=iOS Simulator,OS=latest,name=iPhone 17'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        if: matrix.os == 'macos-15'
        run: sudo xcode-select --switch /Applications/Xcode_16.4.app

      - name: Run package tests (iOS)
        run: |
          xcodebuild test \
            -workspace .swiftpm/xcode/package.xcworkspace \
            -scheme ThemeKit-Package \
            -destination '${{ matrix.simulator }}'

      - name: Run package tests (macOS)
        run: swift test --arch arm64

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate example project
        working-directory: Example
        run: xcodegen generate

      - name: Build ExampleSwiftUI
        run: |
          xcodebuild build \
            -project Example/Example.xcodeproj \
            -scheme ExampleSwiftUI \
            -destination '${{ matrix.simulator }}' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build ExampleUIKit
        run: |
          xcodebuild build \
            -project Example/Example.xcodeproj \
            -scheme ExampleUIKit \
            -destination '${{ matrix.simulator }}' \
            CODE_SIGNING_ALLOWED=NO
